<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudelele - Sua Caminhada rumo à Aprovação</title>
    
    <!-- Importação do Tailwind CSS para estilização rápida e responsiva -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Ícones do Font Awesome para os botões das aulas -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        /* Fonte Nunito: A mesma utilizada pelo Duolingo para um aspecto amigável */
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

        body {
            font-family: 'Nunito', sans-serif;
            background-color: #ffffff;
            color: #4b4b4b;
            overflow-x: hidden;
        }

        /* Efeito de hover nos itens da barra lateral */
        .sidebar-item {
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .sidebar-item:hover {
            background-color: #f1f1f1;
        }

        /* Estilo para a disciplina selecionada no menu */
        .sidebar-item.active {
            background-color: #ddf4ff;
            color: #1899d6;
            border: 2px solid #84d8ff;
        }

        /* Estilo dos botões redondos de aula (Estilo Duolingo) */
        .lesson-node {
            width: 85px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            /* Sombra que dá o aspecto 3D (o 'botão' que afunda) */
            box-shadow: 0 8px 0 rgba(0,0,0,0.1);
        }

        /* Efeito de 'clique' onde o botão desce */
        .lesson-node:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
        }

        /* CORES POR MATÉRIA: Você pode alterar os hexadecimais aqui */
        .bg-geo { background-color: #1cb0f6; border: 4px solid #1899d6; } /* Azul */
        .bg-ped { background-color: #58cc02; border: 4px solid #46a302; } /* Verde */
        .bg-leg { background-color: #ff9600; border: 4px solid #e18500; } /* Laranja */
        .bg-lp { background-color: #ce82ff; border: 4px solid #a568cc; }  /* Roxo */

        /* Limitador de texto para os nomes das aulas (máximo 2 linhas) */
        .lesson-label {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            min-height: 2.5rem;
        }

        /* Estilização básica da barra de rolagem */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #bbb; }
    </style>
</head>
<body class="flex min-h-screen">

    <!-- BARRA LATERAL (SIDEBAR) -->
    <nav class="w-64 border-r-2 border-gray-200 hidden md:flex flex-col p-4 fixed h-full bg-white z-30">
        <div class="px-4 py-6">
            <!-- Título do seu site -->
            <h1 class="text-3xl font-extrabold text-[#58cc02] tracking-tighter">ESTUDELELE</h1>
            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-1">Concurso Rede Federal</p>
        </div>
        
        <!-- Lista de matérias no menu -->
        <div class="space-y-2 flex-grow overflow-y-auto pr-2">
            <button onclick="changeSubject('geografia')" id="btn-geografia" class="sidebar-item active w-full flex items-center gap-4 px-4 py-3 rounded-xl font-bold uppercase tracking-wide">
                <i class="fas fa-earth-americas text-2xl"></i> Geografia
            </button>
            <button onclick="changeSubject('pedagogia')" id="btn-pedagogia" class="sidebar-item w-full flex items-center gap-4 px-4 py-3 rounded-xl font-bold uppercase tracking-wide">
                <i class="fas fa-chalkboard-user text-2xl"></i> Pedagogia
            </button>
            <button onclick="changeSubject('legislacao')" id="btn-legislacao" class="sidebar-item w-full flex items-center gap-4 px-4 py-3 rounded-xl font-bold uppercase tracking-wide">
                <i class="fas fa-scale-balanced text-2xl"></i> Legislação
            </button>
            <button onclick="changeSubject('lp')" id="btn-lp" class="sidebar-item w-full flex items-center gap-4 px-4 py-3 rounded-xl font-bold uppercase tracking-wide">
                <i class="fas fa-book text-2xl"></i> Português
            </button>
        </div>

        <!-- Footer da Sidebar (Perfil Simulado) -->
        <div class="border-t-2 border-gray-100 pt-4 mt-auto">
            <div class="bg-gray-50 rounded-2xl p-4 flex items-center gap-3 border border-gray-100">
                <div class="w-10 h-10 bg-[#58cc02] rounded-full flex items-center justify-center text-white shadow-sm">
                    <i class="fas fa-user-graduate"></i>
                </div>
                <div>
                    <p class="text-sm font-bold">Futuro Servidor</p>
                    <p class="text-[10px] text-gray-500 font-bold">NÍVEL 24</p>
                </div>
            </div>
        </div>
    </nav>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="flex-grow md:ml-64 flex flex-col items-center pb-20 bg-gray-50/30">
        
        <!-- HEADER COM PROGRESSO (FIXO NO TOPO) -->
        <header class="w-full max-w-4xl px-6 py-6 border-b-2 border-gray-100 mb-10 sticky top-0 bg-white/90 backdrop-blur-sm z-20 flex flex-col items-center">
            <div class="w-full flex justify-between items-center mb-4">
                <h2 id="subject-title" class="text-2xl font-black text-gray-700 uppercase tracking-wide">Geografia</h2>
                <!-- Status bar estilo Duolingo -->
                <div class="flex gap-6">
                    <span class="text-orange-500 font-bold flex items-center gap-2">
                        <i class="fas fa-fire text-xl"></i> 14 DIAS
                    </span>
                    <span class="text-blue-400 font-bold flex items-center gap-2">
                        <i class="fas fa-gem text-xl"></i> 850
                    </span>
                </div>
            </div>
            <!-- Barra de progresso da matéria -->
            <div class="w-full bg-gray-200 rounded-full h-4 overflow-hidden shadow-inner">
                <div id="progress-bar" class="bg-[#58cc02] h-full transition-all duration-700 ease-out" style="width: 5%;"></div>
            </div>
        </header>

        <!-- GRADE DE AULAS -->
        <div id="lessons-grid" class="grid grid-cols-2 sm:grid-cols-4 gap-y-16 gap-x-12 max-w-4xl px-8 items-start justify-items-center">
            <!-- Os botões das aulas serão injetados aqui pelo JavaScript -->
        </div>
    </main>

    <script>
        /* BANCO DE DADOS DAS AULAS ATUALIZADO COM O DOCUMENTO DE GEOGRAFIA */
        const lessonsData = {
            geografia: {
                title: "Geografia",
                colorClass: "bg-geo",
                icon: "fa-earth-americas",
                topics: [
                    "História e Epistemologia da Geografia", 
                    "Categorias de Análise Geográfica", 
                    "Fundamentos da Cartografia e Escalas", 
                    "Projeções Cartográficas e Geopolítica do Olhar", 
                    "Cartografia Temática e Linguagem Visual", 
                    "Sensoriamento Remoto e Coleta de Dados", 
                    "Sistemas de Informação Geográfica (SIG) e Análise Espacial", 
                    "Geoprocessamento Aplicado ao Planejamento Territorial", 
                    "Estrutura Interna da Terra e Tectônica de Placas", 
                    "Geomorfologia I: Processos Endógenos e Formação do Relevo", 
                    "Geomorfologia II: Processos Exógenos e Modelado da Paisagem", 
                    "Pedologia e Dinâmica dos Solos no Brasil", 
                    "Climatologia Dinâmica e Atuação das Massas de Ar", 
                    "Hidrografia e Gestão de Bacias Hidrográficas", 
                    "Biogeografia e os Domínios Morfoclimáticos de Ab'Sáber", 
                    "Questão Ambiental, Riscos e Vulnerabilidades", 
                    "Sustentabilidade e Mudanças Climáticas Globais", 
                    "Teorias Demográficas e Transição Populacional", 
                    "Dinâmica Populacional e Mobilidade no Brasil", 
                    "Processo de Urbanização Mundial e Brasileira", 
                    "Metropolização e Segregação Socioespacial", 
                    "Capitalismo, Globalização e Reestruturação Produtiva", 
                    "Divisão Internacional do Trabalho (DIT) e Redes Técnicas", 
                    "Blocos Econômicos e Integração Regional", 
                    "Espaço Agrário: Conflitos e Estrutura Fundiária", 
                    "Agronegócio vs. Agricultura Familiar", 
                    "Industrialização e Organização do Espaço Brasileiro", 
                    "Geopolítica Mundial Pós-Guerra Fria e Conflitos", 
                    "Metodologias Ativas e Ensino de Geografia na EPT", 
                    "Geografia Aplicada aos Eixos Tecnológicos e Políticas Públicas"
                ]
            },
            pedagogia: {
                title: "Pedagogia",
                colorClass: "bg-ped",
                icon: "fa-graduation-cap",
                topics: [
                    "Organização Rede Federal", "Papel do Docente EBTT", "Currículo Integrado", "Interdisciplinaridade",
                    "Planejamento Pedagógico", "Metodologias EPT", "Avaliação Aprendizagem", "Educação Inclusiva",
                    "Mediação Docente", "Gestão Acadêmica"
                ]
            },
            legislacao: {
                title: "Legislação",
                colorClass: "bg-leg",
                icon: "fa-scale-balanced",
                topics: [
                    "Lei 8.112/1990", "Lei 12.772/2012", "Lei 11.892/2008", "Lei 9.394/1996",
                    "Decreto 5.154/2004", "Decreto 5.840/2006", "Decreto 1.171/1994", "Lei 13.146/2015",
                    "Lei 7.853/1989", "Decreto 7.611/2011", "Lei 12.288/2010", "Portaria 6.719/2024", "Crimes Administração Pública"
                ]
            },
            lp: {
                title: "Português",
                colorClass: "bg-lp",
                icon: "fa-pen-nib",
                topics: [
                    "Leitura e Interpretação", "Gêneros e Tipos", "Coesão e Coerência", "Semântica e Léxico",
                    "Morfologia", "Morfossintaxe Pronome e Verbo", "Sintaxe Período", "Concordância e Regência",
                    "Pontuação", "Ortografia Oficial"
                ]
            }
        };

        /**
         * FUNÇÃO SLUGIFY: 
         * Transforma o nome da aula em um formato aceitável para arquivo .html
         */
        function slugify(text) {
            return text.toString().toLowerCase()
                .normalize('NFD').replace(/[\u0300-\u036f]/g, '') // Remove acentos
                .replace(/\s+/g, '-')             // Troca espaços por -
                .replace(/[^\w\-]+/g, '')         // Remove caracteres especiais
                .replace(/\-\-+/g, '-')           // Evita hífens duplos
                .replace(/^-+/, '')               // Remove hífen no início
                .replace(/-+$/, '');              // Remove hífen no fim
        }

        /**
         * FUNÇÃO PARA MUDAR A MATÉRIA:
         * Renderiza os botões com os nomes dos arquivos prontos.
         */
        function changeSubject(subjectKey) {
            const subject = lessonsData[subjectKey];
            const grid = document.getElementById('lessons-grid');
            const title = document.getElementById('subject-title');
            const progressBar = document.getElementById('progress-bar');
            
            document.querySelectorAll('.sidebar-item').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${subjectKey}`).classList.add('active');

            title.innerText = subject.title;
            progressBar.style.width = '10%'; 

            grid.innerHTML = '';
            
            console.log(`--- LISTA DE ARQUIVOS PARA: ${subject.title} ---`);

            subject.topics.forEach((topic) => {
                const slug = slugify(topic);
                const fileName = `${subjectKey}-${slug}.html`;
                
                console.log(`Criar: ${fileName}`);

                const node = document.createElement('div');
                node.className = 'flex flex-col items-center w-full max-w-[140px] group';
                node.innerHTML = `
                    <a href="${fileName}" 
                       title="Abrir aula: ${topic}"
                       class="lesson-node ${subject.colorClass} text-white mb-4 hover:brightness-110">
                        <i class="fas ${subject.icon} text-3xl"></i>
                    </a>
                    <span class="lesson-label text-[11px] font-extrabold text-center uppercase text-gray-500 leading-tight group-hover:text-gray-800 transition-colors">
                        ${topic}
                    </span>
                `;
                grid.appendChild(node);
            });
        }

        window.onload = () => {
            changeSubject('geografia');
            console.log("DICA: Abra o console (F12) para ver a lista de nomes de arquivos das 30 aulas de Geografia!");
        };
    </script>
</body>
</html>
